<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UR Laptop Tracker — Admin Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #22263a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f2f8;
      --muted: #7a80a0;
      --accent: #4f8ef7;
      --danger: #f04a4a;
      --success: #2dcf8a;
      --warning: #f5a623;
      --card-radius: 12px;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── TOPBAR ── */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
    .topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.2px; }
    .topbar-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--success); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .admin-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--accent); }

    /* ── LAYOUT ── */
    .layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 56px); }

    /* ── SIDEBAR ── */
    .sidebar { width: 300px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    .sidebar-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
    .search-box { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; }
    .search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; width: 100%; }
    .search-box input::placeholder { color: var(--muted); }
    .filter-tabs { display: flex; gap: 4px; margin-top: 10px; }
    .filter-tab { flex: 1; padding: 5px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 11px; cursor: pointer; transition: all 0.15s; text-align: center; }
    .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-tab:hover:not(.active) { background: var(--bg3); color: var(--text); }

    .laptop-list { overflow-y: auto; flex: 1; padding: 8px; }
    .laptop-list::-webkit-scrollbar { width: 4px; }
    .laptop-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .laptop-card { padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 6px; cursor: pointer; transition: all 0.15s; background: var(--bg); }
    .laptop-card:hover, .laptop-card.active { background: var(--bg3); border-color: var(--accent); }
    .laptop-card.stolen { border-left: 3px solid var(--danger); }
    .lc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .lc-name { font-size: 13px; font-weight: 500; }
    .lc-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .badge-online { background: rgba(45,207,138,0.15); color: var(--success); }
    .badge-stolen { background: rgba(240,74,74,0.15); color: var(--danger); }
    .badge-offline { background: rgba(122,128,160,0.15); color: var(--muted); }
    .lc-id { font-size: 11px; color: var(--muted); }
    .lc-location { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
    .lc-time { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── STATS BAR ── */
    .stats-bar { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .stat-item { flex: 1; padding: 14px 20px; background: var(--bg2); }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 600; }
    .stat-value.blue { color: var(--accent); }
    .stat-value.green { color: var(--success); }
    .stat-value.red { color: var(--danger); }
    .stat-value.orange { color: var(--warning); }

    /* ── MAP ── */
    .map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }
    .map-legend { position: absolute; bottom: 20px; left: 20px; z-index: 1000; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 11px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; color: var(--muted); }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── DETAIL PANEL ── */
    .detail-panel { width: 320px; flex-shrink: 0; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    .detail-panel::-webkit-scrollbar { width: 4px; }
    .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 13px; gap: 8px; }
    .detail-icon { font-size: 32px; }

    .dp-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .dp-brand { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
    .dp-model { font-size: 12px; color: var(--muted); }
    .dp-status { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 12px; padding: 4px 10px; border-radius: 20px; }
    .dp-status.stolen { background: rgba(240,74,74,0.15); color: var(--danger); }
    .dp-status.safe { background: rgba(45,207,138,0.15); color: var(--success); }

    .dp-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .dp-section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 12px; }
    .dp-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; font-size: 13px; }
    .dp-row:last-child { margin-bottom: 0; }
    .dp-key { color: var(--muted); }
    .dp-val { font-weight: 500; text-align: right; max-width: 170px; word-break: break-all; }
    .dp-val.danger { color: var(--danger); }
    .dp-val.success { color: var(--success); }

    .gmail-pill { display: inline-block; background: rgba(79,142,247,0.12); color: var(--accent); font-size: 11px; padding: 3px 8px; border-radius: 20px; margin: 2px; border: 1px solid rgba(79,142,247,0.25); }

    .dp-actions { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
    .btn { padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s; font-weight: 500; }
    .btn:hover { background: var(--bg); }
    .btn.danger { background: rgba(240,74,74,0.12); border-color: rgba(240,74,74,0.3); color: var(--danger); }
    .btn.danger:hover { background: rgba(240,74,74,0.2); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { opacity: 0.9; }

    .history-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .history-item:last-child { border-bottom: none; }
    .history-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; margin-top: 3px; }
    .history-dot.suspicious { background: var(--danger); }
    .history-info { flex: 1; }
    .history-loc { font-weight: 500; color: var(--text); }
    .history-time { color: var(--muted); margin-top: 1px; }

    /* ── TOAST ── */
    .toast-container { position: fixed; top: 70px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 13px; min-width: 260px; animation: slideIn 0.2s ease; pointer-events: all; }
    .toast.danger { border-left: 3px solid var(--danger); }
    .toast.success { border-left: 3px solid var(--success); }
    @keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">UR</div>
    <div>
      <div class="topbar h1" style="font-size:15px;font-weight:600;">Laptop Tracker</div>
      <div class="topbar-sub">University of Rwanda — Admin Dashboard</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><div class="live-dot"></div> Live tracking</div>
    <div class="admin-avatar">AD</div>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Laptops</div>
      <div class="search-box">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search student or serial..." />
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">All</button>
        <button class="filter-tab" data-filter="online" onclick="setFilter('online', this)">Online</button>
        <button class="filter-tab" data-filter="stolen" onclick="setFilter('stolen', this)">Stolen</button>
        <button class="filter-tab" data-filter="offline" onclick="setFilter('offline', this)">Offline</button>
      </div>
    </div>
    <div class="laptop-list" id="laptopList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-label">Total Laptops</div><div class="stat-value blue" id="statTotal">0</div></div>
      <div class="stat-item"><div class="stat-label">Online Now</div><div class="stat-value green" id="statOnline">0</div></div>
      <div class="stat-item"><div class="stat-label">Reported Stolen</div><div class="stat-value red" id="statStolen">0</div></div>
      <div class="stat-item"><div class="stat-label">Offline</div><div class="stat-value orange" id="statOffline">0</div></div>
    </div>

    <!-- MAP -->
    <div class="map-container">
      <div id="map"></div>
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div> Online</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div> Stolen / Suspicious</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--muted)"></div> Offline</div>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">
      <div class="detail-icon">&#128187;</div>
      <div>Select a laptop to view details</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API_URL = localStorage.getItem('api_url') || 'https://laptop-tracker-production-f292.up.railway.app/api';
const TOKEN = localStorage.getItem('admin_token') || '';

let allLaptops = [];
let currentFilter = 'all';
let selectedId = null;
let map, markers = {};

// ── MOCK DATA (replace with real API calls) ──
const MOCK_LAPTOPS = [
  { laptop_id: '1', serial_number: 'SN-2021-001', brand: 'Lenovo', model: 'IdeaPad 3', student_name: 'Jean Paul Hakizimana', student_id: 'UR/CST/2021/001', is_reported_stolen: false, ip_address: '196.24.10.5', city: 'Kigali', country: 'Rwanda', wifi_name: 'UR-Campus-WiFi', os_user: 'jp.hakizimana', gmail_accounts: ['jean.paul@gmail.com'], last_seen: new Date(Date.now() - 120000).toISOString(), latitude: -1.9441, longitude: 30.0619 },
  { laptop_id: '2', serial_number: 'SN-2021-002', brand: 'HP', model: 'EliteBook 840', student_name: 'Amina Uwimana', student_id: 'UR/CST/2021/002', is_reported_stolen: true, ip_address: '41.186.25.100', city: 'Musanze', country: 'Rwanda', wifi_name: 'Unknown-Network', os_user: 'user123', gmail_accounts: ['suspect@gmail.com', 'thief2024@gmail.com'], last_seen: new Date(Date.now() - 600000).toISOString(), latitude: -1.4990, longitude: 29.6340 },
  { laptop_id: '3', serial_number: 'SN-2021-003', brand: 'Dell', model: 'Latitude 5420', student_name: 'Eric Ndayishimiye', student_id: 'UR/CST/2021/003', is_reported_stolen: false, ip_address: '196.24.10.8', city: 'Kigali', country: 'Rwanda', wifi_name: 'UR-Campus-WiFi', os_user: 'e.ndayishimiye', gmail_accounts: ['eric.ndayi@gmail.com'], last_seen: new Date(Date.now() - 60000).toISOString(), latitude: -1.9500, longitude: 30.0580 },
  { laptop_id: '4', serial_number: 'SN-2021-004', brand: 'Lenovo', model: 'ThinkPad E14', student_name: 'Grace Ingabire', student_id: 'UR/CST/2021/004', is_reported_stolen: false, ip_address: null, city: null, country: null, wifi_name: null, os_user: null, gmail_accounts: [], last_seen: new Date(Date.now() - 86400000).toISOString(), latitude: null, longitude: null },
  { laptop_id: '5', serial_number: 'SN-2021-005', brand: 'HP', model: 'ProBook 450', student_name: 'Patrick Habimana', student_id: 'UR/CST/2021/005', is_reported_stolen: false, ip_address: '196.24.11.44', city: 'Huye', country: 'Rwanda', wifi_name: 'Home-Network', os_user: 'p.habimana', gmail_accounts: ['patrick.habi@gmail.com'], last_seen: new Date(Date.now() - 900000).toISOString(), latitude: -2.5939, longitude: 29.7400 },
];

function getStatus(laptop) {
  if (laptop.is_reported_stolen) return 'stolen';
  const lastSeen = new Date(laptop.last_seen);
  const diffMins = (Date.now() - lastSeen) / 60000;
  if (diffMins < 15) return 'online';
  return 'offline';
}

function timeAgo(isoString) {
  const diff = Math.floor((Date.now() - new Date(isoString)) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

// ── MAP INIT ──
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([-1.9706, 30.1044], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19
  }).addTo(map);
}

function makeIcon(status) {
  const colors = { online: '#2dcf8a', stolen: '#f04a4a', offline: '#7a80a0' };
  const color = colors[status] || '#7a80a0';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="28" viewBox="0 0 22 28"><circle cx="11" cy="11" r="10" fill="${color}" fill-opacity="0.25" stroke="${color}" stroke-width="2"/><circle cx="11" cy="11" r="5" fill="${color}"/></svg>`;
  return L.divIcon({ html: svg, iconSize: [22, 28], iconAnchor: [11, 11], className: '' });
}

function updateMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  allLaptops.forEach(laptop => {
    if (!laptop.latitude || !laptop.longitude) return;
    const status = getStatus(laptop);
    const marker = L.marker([laptop.latitude, laptop.longitude], { icon: makeIcon(status) });
    marker.bindTooltip(`<strong>${laptop.student_name}</strong><br>${laptop.brand} ${laptop.model}<br>${laptop.city || ''}`, { className: 'leaflet-dark-tooltip' });
    marker.on('click', () => selectLaptop(laptop.laptop_id));
    marker.addTo(map);
    markers[laptop.laptop_id] = marker;
  });
}

// ── SIDEBAR LIST ──
function renderList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('laptopList');
  const filtered = allLaptops.filter(l => {
    const status = getStatus(l);
    const matchFilter = currentFilter === 'all' || status === currentFilter;
    const matchSearch = !search ||
      l.student_name.toLowerCase().includes(search) ||
      l.serial_number.toLowerCase().includes(search) ||
      (l.student_id || '').toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  list.innerHTML = filtered.map(l => {
    const status = getStatus(l);
    const badgeClass = status === 'online' ? 'badge-online' : status === 'stolen' ? 'badge-stolen' : 'badge-offline';
    const badgeText = status === 'online' ? 'Online' : status === 'stolen' ? 'STOLEN' : 'Offline';
    return `<div class="laptop-card ${status === 'stolen' ? 'stolen' : ''} ${selectedId === l.laptop_id ? 'active' : ''}" onclick="selectLaptop('${l.laptop_id}')">
      <div class="lc-top">
        <span class="lc-name">${l.student_name}</span>
        <span class="lc-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="lc-id">${l.serial_number} &middot; ${l.brand} ${l.model}</div>
      ${l.city ? `<div class="lc-location"><svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>${l.city}, ${l.country}</div>` : '<div class="lc-location">No location data</div>'}
      <div class="lc-time">Last seen ${timeAgo(l.last_seen)}</div>
    </div>`;
  }).join('');
}

// ── STATS ──
function updateStats() {
  document.getElementById('statTotal').textContent = allLaptops.length;
  document.getElementById('statOnline').textContent = allLaptops.filter(l => getStatus(l) === 'online').length;
  document.getElementById('statStolen').textContent = allLaptops.filter(l => l.is_reported_stolen).length;
  document.getElementById('statOffline').textContent = allLaptops.filter(l => getStatus(l) === 'offline').length;
}

// ── DETAIL PANEL ──
function selectLaptop(id) {
  selectedId = id;
  const laptop = allLaptops.find(l => l.laptop_id === id);
  if (!laptop) return;

  renderList();

  if (laptop.latitude && laptop.longitude) {
    map.flyTo([laptop.latitude, laptop.longitude], 13, { duration: 1 });
  }

  const status = getStatus(laptop);
  const panel = document.getElementById('detailPanel');

  const gmailHtml = laptop.gmail_accounts && laptop.gmail_accounts.length > 0
    ? laptop.gmail_accounts.map(g => `<span class="gmail-pill">${g}</span>`).join('')
    : '<span style="color:var(--muted);font-size:12px">None detected</span>';

  const mockHistory = [
    { loc: laptop.city || 'Unknown', time: timeAgo(laptop.last_seen), suspicious: laptop.is_reported_stolen },
    { loc: 'Kigali, Rwanda', time: '32m ago', suspicious: false },
    { loc: 'Kigali, Rwanda', time: '1h ago', suspicious: false },
  ];

  panel.innerHTML = `
    <div class="dp-header">
      <div class="dp-brand">${laptop.brand} ${laptop.model}</div>
      <div class="dp-model">${laptop.serial_number}</div>
      <div class="dp-status ${status === 'stolen' ? 'stolen' : 'safe'}">
        ${status === 'stolen' ? '&#9888; Reported Stolen' : status === 'online' ? '&#10003; Online' : '&#9679; Offline'}
      </div>
    </div>

    <div class="dp-section">
      <div class="dp-section-title">Student</div>
      <div class="dp-row"><span class="dp-key">Name</span><span class="dp-val">${laptop.student_name}</span></div>
      <div class="dp-row"><span class="dp-key">Student ID</span><span class="dp-val">${laptop.student_id}</span></div>
    </div>

    <div class="dp-section">
      <div class="dp-section-title">Last Location</div>
      <div class="dp-row"><span class="dp-key">IP Address</span><span class="dp-val ${laptop.is_reported_stolen ? 'danger' : ''}">${laptop.ip_address || 'Unknown'}</span></div>
      <div class="dp-row"><span class="dp-key">City</span><span class="dp-val">${laptop.city || 'Unknown'}</span></div>
      <div class="dp-row"><span class="dp-key">WiFi Name</span><span class="dp-val">${laptop.wifi_name || 'Unknown'}</span></div>
      <div class="dp-row"><span class="dp-key">OS User</span><span class="dp-val ${laptop.is_reported_stolen ? 'danger' : ''}">${laptop.os_user || 'Unknown'}</span></div>
      <div class="dp-row"><span class="dp-key">Last Seen</span><span class="dp-val">${timeAgo(laptop.last_seen)}</span></div>
    </div>

    <div class="dp-section">
      <div class="dp-section-title">Gmail Accounts Detected</div>
      <div style="margin-top:4px">${gmailHtml}</div>
    </div>

    <div class="dp-section">
      <div class="dp-section-title">Recent Pings</div>
      ${mockHistory.map(h => `
        <div class="history-item">
          <div class="history-dot ${h.suspicious ? 'suspicious' : ''}"></div>
          <div class="history-info">
            <div class="history-loc">${h.loc}</div>
            <div class="history-time">${h.time}</div>
          </div>
        </div>`).join('')}
    </div>

    <div class="dp-actions">
      <button class="btn primary" onclick="generateEvidence('${id}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Generate Evidence Report
      </button>
      ${status !== 'stolen' ? `
      <button class="btn danger" onclick="reportStolen('${id}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Mark as Stolen
      </button>` : `
      <button class="btn" onclick="markSafe('${id}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Mark as Recovered
      </button>`}
      <button class="btn" onclick="sendLock('${id}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Remote Lock
      </button>
    </div>
  `;
}

// ── ACTIONS ──
function generateEvidence(id) {
  showToast('Generating evidence report...', 'success');
  setTimeout(() => showToast('Evidence report ready! Download started.', 'success'), 1500);
}

function reportStolen(id) {
  const laptop = allLaptops.find(l => l.laptop_id === id);
  if (!laptop) return;
  if (confirm(`Mark ${laptop.brand} ${laptop.model} (${laptop.student_name}) as STOLEN?`)) {
    laptop.is_reported_stolen = true;
    updateStats();
    renderList();
    updateMarkers();
    selectLaptop(id);
    showToast(`Laptop marked as stolen. Tracking activated!`, 'danger');
  }
}

function markSafe(id) {
  const laptop = allLaptops.find(l => l.laptop_id === id);
  if (laptop) {
    laptop.is_reported_stolen = false;
    updateStats(); renderList(); updateMarkers(); selectLaptop(id);
    showToast('Laptop marked as recovered.', 'success');
  }
}

function sendLock(id) {
  showToast('Lock command queued. Will execute on next ping.', 'success');
}

// ── TOAST ──
function showToast(msg, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

// ── FILTERS ──
function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ── INIT ──
document.getElementById('searchInput').addEventListener('input', renderList);

async function loadLaptops() {
  try {
    const res = await fetch(`${API_URL}/laptops`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` }
    });
    if (res.ok) {
      const data = await res.json();
      allLaptops = data.laptops || [];
    } else {
      throw new Error('API not available');
    }
  } catch {
    allLaptops = MOCK_LAPTOPS;
    showToast('Using demo data. Connect your API to see live data.', 'success');
  }
  updateStats();
  renderList();
  updateMarkers();

  // Alert for stolen laptops
  const stolen = allLaptops.filter(l => l.is_reported_stolen);
  if (stolen.length > 0) {
    setTimeout(() => showToast(`ALERT: ${stolen.length} stolen laptop(s) detected online!`, 'danger'), 1000);
  }
}

initMap();
loadLaptops();

// Refresh every 60 seconds
setInterval(loadLaptops, 60000);
</script>

</body>
</html>
